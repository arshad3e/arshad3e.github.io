<!DOCTYPE html>

<head>

  <title>Arshad's Diary Portfolio</title>
  <style>
    /* Global Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f9f4ef;
      color: #4e4b43;
      font-family: 'Georgia', serif;
      padding: 2rem;
      line-height: 1.6;
    }

    .editor-container {
      background: #faf8f6;
      border: 1px solid #dcd2c6;
      border-radius: 10px;
      padding: 2rem;
      margin: 2rem auto;
      max-width: 800px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #8c6c54;
      text-align: center;
      font-size: 2rem;
    }

    code {
      display: block;
      background: #fff4e0;
      color: #6e5c4b;
      padding: 0.75rem 1rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      border-radius: 5px;
      margin: 0.5rem 0;
    }

    a {
      color: #9a6d3f;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    img {
      vertical-align: middle;
      margin-left: 0.5rem;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #7c7063;
    }

    .date-time {
      font-style: italic;
      text-align: center;
      color: #867f78;
      margin-bottom: 2rem;
    }
  </style>
  <script>
    function updateDateTime() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
      document.getElementById('date-time').textContent = now.toLocaleDateString('en-US', options);
    }
    window.onload = updateDateTime;
  </script>
</head>

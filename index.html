<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procedural Jungle</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      background-color: #000;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Basic Car Shape (Procedural)
    const carGeometry = new THREE.BoxGeometry(1, 0.5, 2);
    const carMaterial = new THREE.MeshStandardMaterial({ color: 0xffa500 }); // Orange
    const car = new THREE.Mesh(carGeometry, carMaterial);
    scene.add(car);

    // Procedural "Jungle" (Simplified)
    for (let i = 0; i < 100; i++) {
      const x = (Math.random() - 0.5) * 50;
      const z = (Math.random() - 0.5) * 50;
      const height = Math.random() * 5 + 1;

      const treeGeometry = new THREE.CylinderGeometry(0.2, 0.2, height);
      const treeMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22 }); // Green
      const tree = new THREE.Mesh(treeGeometry, treeMaterial);
      tree.position.set(x, height / 2, z);
      scene.add(tree);
    }

    // Ground (Procedural)
    const groundGeometry = new THREE.PlaneGeometry(100, 100);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x38761d }); // Darker green
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // ... (Your movement code, camera setup, animation loop, etc. - same as before)

    // Basic Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);

    camera.position.set(0, 10, 20); // Initial camera position
    camera.lookAt(car.position); // Look at the car


    // Animation loop (modified)
    function animate() {
      requestAnimationFrame(animate);
      handleMovement();
      // ... (camera updates, rendering)
    }

    // ... (rest of your code)

  </script>
</body>
</html>

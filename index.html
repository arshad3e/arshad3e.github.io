<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshad Shaik's Portfolio Jungle Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
        }

        .info-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            font-size: 1rem;
            z-index: 1000;
        }

        .score {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            font-size: 1rem;
            z-index: 1000;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #0d0d0d;
            border: 2px solid white;
        }
    </style>
</head>

<body>

    <div class="info-panel">
        <h1>Welcome to Arshad's Portfolio Jungle!</h1>
        <p>Use arrow keys to move and jump in the game below.</p>
        <ul>
            <li>Projects: <a href="./projects.html" target="_blank">Explore Projects</a></li>
            <li>Blog: <a href="./blog.html" target="_blank">Read Blog Posts</a></li>
            <li>Contact: <a href="mailto:arshad.3e.1@gmail.com">Email Me</a></li>
        </ul>
    </div>

    <div class="score" id="score">Score: 0</div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        // Game Variables
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0;
        let gameOver = false;

        // Player Variables
        const player = {
            x: 50,
            y: canvas.height - 100,
            width: 30,
            height: 50,
            speed: 5,
            dx: 0,
            dy: 0,
            gravity: 0.5,
            jumpPower: -10,
            grounded: false
        };

        // Platform Variables
        const platforms = [
            { x: 0, y: canvas.height - 50, width: canvas.width, height: 50 }, // Ground
            { x: 200, y: 450, width: 150, height: 20 },
            { x: 400, y: 350, width: 150, height: 20 },
            { x: 600, y: 250, width: 150, height: 20 },
        ];

        // Falling objects (simulating Donkey Kong)
        const fallingObjects = [];
        const fallingObjectSpeed = 3;

        // Event listeners for player movement
        let keys = {};
        window.addEventListener("keydown", (e) => {
            keys[e.key] = true;
        });
        window.addEventListener("keyup", (e) => {
            keys[e.key] = false;
        });

        // Game Loop
        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = "red";
                ctx.font = "30px Arial";
                ctx.fillText("Game Over!", canvas.width / 2 - 80, canvas.height / 2);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            movePlayer();
            updatePlayerPosition();
            detectCollisions();
            drawPlatforms();
            drawFallingObjects();
            drawPlayer();
            updateScore();

            requestAnimationFrame(gameLoop);
        }

        // Draw Platforms
        function drawPlatforms() {
            ctx.fillStyle = "#228B22"; // Ground and platforms color
            platforms.forEach(platform => {
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
            });
        }

        // Draw the Player
        function drawPlayer() {
            ctx.fillStyle = "#ff5733"; // Red player (box)
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        // Move Player
        function movePlayer() {
            if (keys["ArrowLeft"]) {
                player.dx = -player.speed;
            } else if (keys["ArrowRight"]) {
                player.dx = player.speed;
            } else {
                player.dx = 0;
            }

            if (keys["ArrowUp"] && player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }

            player.x += player.dx;
            player.y += player.dy;
        }

        // Update Player Position (gravity and jumping)
        function updatePlayerPosition() {
            // Apply gravity
            if (player.y + player.height < canvas.height) {
                player.dy += player.gravity;
            } else {
                player.dy = 0;
                player.grounded = true;
            }

            // Prevent going off-screen
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        }

        // Detect Collisions
        function detectCollisions() {
            // Platform collisions
            player.grounded = false;
            platforms.forEach(platform => {
                if (player.y + player.height <= platform.y && player.y + player.height + player.dy >= platform.y &&
                    player.x + player.width > platform.x && player.x < platform.x + platform.width) {
                    player.y = platform.y - player.height;
                    player.dy = 0;
                    player.grounded = true;
                }
            });

            // Falling object collisions
            fallingObjects.forEach((object, index) => {
                if (object.x < player.x + player.width && object.x + object.width > player.x &&
                    object.y < player.y + player.height && object.y + object.height > player.y) {
                    gameOver = true;
                }
            });
        }

        // Generate Falling Objects (simulating Donkey Kong)
        function generateFallingObjects() {
            if (Math.random() < 0.02) {
                const x = Math.random() * canvas.width;
                fallingObjects.push({ x, y: 0, width: 20, height: 20 });
            }
        }

        // Draw Falling Objects
        function drawFallingObjects() {
            ctx.fillStyle = "yellow"; // Falling objects (simulating barrels)
            fallingObjects.forEach((object, index) => {
                object.y += fallingObjectSpeed;
                ctx.fillRect(object.x, object.y, object.width, object.height);
            });

            // Remove objects that have fallen out of the canvas
            fallingObjects.forEach((object, index) => {
                if (object.y > canvas.height) {
                    fallingObjects.splice(index, 1);
                    score += 10; // Increase score when object disappears
                }
            });
        }

        // Update the score
        function updateScore() {
            document.getElementById("score").textContent = `Score: ${score}`;
        }

        // Start the game
        generateFallingObjects();
        gameLoop();

    </script>
</body>

</html>

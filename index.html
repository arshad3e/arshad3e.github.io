<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshad Shaik</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
        }

        .info-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            font-size: 1rem;
            z-index: 1000;
        }

        .prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            font-size: 1.2rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>

<body>

    <div class="info-panel">
        <h1>Welcome to Arshad's Portfolio Jungle!</h1>
        <p>Use arrow keys to navigate.</p>
        <ul>
            <li>Projects: <a href="./projects.html" target="_blank">Explore Projects</a></li>
            <li>Blog: <a href="./blog.html" target="_blank">Read Blog Posts</a></li>
            <li>Contact: <a href="mailto:arshad.3e.1@gmail.com">Email Me</a></li>
        </ul>
    </div>

    <div class="prompt" id="prompt-box">
        <p>Do you want to visit the Projects or Blog?</p>
        <button onclick="window.location.href='./projects.html'">Go to Projects</button>
        <button onclick="window.location.href='./blog.html'">Go to Blog</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        // Red Box (Car)
        const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
        const boxMaterial = new THREE.MeshStandardMaterial({ color: 0xff5733 });
        const box = new THREE.Mesh(boxGeometry, boxMaterial);
        box.position.y = 0.5;
        scene.add(box);

        // Ground plane
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Animal-like creatures (Yellow spheres)
        function createAnimal(x, z) {
            const animalGeometry = new THREE.SphereGeometry(1); // Simulating an animal with a sphere
            const animalMaterial = new THREE.MeshStandardMaterial({ color: 0xffff00 });
            const animal = new THREE.Mesh(animalGeometry, animalMaterial);
            animal.position.set(x, 1, z);
            scene.add(animal);
            return animal;
        }

        // Points of interest (animals)
        const animals = [
            { position: new THREE.Vector3(10, 0.5, -10), type: 'Projects' },
            { position: new THREE.Vector3(-20, 0.5, 15), type: 'Blog' }
        ];

        animals.forEach(animal => {
            animal.model = createAnimal(animal.position.x, animal.position.z);
        });

        // Player movement (Red Box / Car)
        const speed = 0.2;
        const keys = {};
        window.addEventListener('keydown', (event) => keys[event.key] = true);
        window.addEventListener('keyup', (event) => keys[event.key] = false);

        function handleMovement() {
            if (keys['ArrowUp']) box.position.z -= speed;
            if (keys['ArrowDown']) box.position.z += speed;
            if (keys['ArrowLeft']) box.position.x -= speed;
            if (keys['ArrowRight']) box.position.x += speed;
        }

        // Camera setup
        camera.position.set(0, 10, 10);
        camera.lookAt(0, 0, 0);

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            handleMovement();
            camera.position.x = box.position.x;
            camera.position.z = box.position.z + 10;
            camera.lookAt(box.position);

            // Collision detection: Check if box (car) collides with any animal
            animals.forEach(animal => {
                const distance = box.position.distanceTo(animal.position);
                if (distance < 2) {
                    document.getElementById('prompt-box').style.display = 'block';
                    document.getElementById('prompt-box').dataset.type = animal.type;
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

    </script>

</body>

</html>
